# 도커 이미지 빌드 + push.
#
# 비교:
#   Spring Boot:    Buildpacks 또는 jib
#   Node:           multi-stage Dockerfile (우리와 비슷)
#   Cloud Run/ECS:  CI 에서 build + push, 배포는 별도 워크플로

name: Build & Push Image

on:
  push:
    branches: [main]
    tags: ['v*']   # 태그 v0.1.0 같은 거에 자동 빌드
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # GitHub Packages (ghcr.io) push

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub Container Registry 로그인 — OIDC 또는 GITHUB_TOKEN
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 메타데이터 자동 — branch / tag / sha 별 태그
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/tender
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      # 멀티 플랫폼 (linux/amd64 + linux/arm64) — Mac M1/M2 + 운영 amd64 동시
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: 05-infra-compose/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions 캐시 — 빌드 시간 단축
          cache-from: type=gha
          cache-to: type=gha,mode=max
