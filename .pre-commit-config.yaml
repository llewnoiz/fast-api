# pre-commit hooks — 02 단계 도입.
# 사용법:
#   uv run pre-commit install            # git hook 으로 설치 (한 번)
#   uv run pre-commit run --all-files    # 전체 파일 수동 실행

repos:
  # 가벼운 위생 검사
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]

  # ruff — 린트 + 자동 수정 + 포맷
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # mypy — 정적 타입 검사 (변경된 파일에만)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^(01-python-basics|02-package-structure)/src/
        additional_dependencies: []
