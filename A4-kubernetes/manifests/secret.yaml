# ⚠️ 운영에선 _절대_ 평문 Secret 커밋 금지.
#
# 권장:
#   - sealed-secrets / sops / Vault / AWS Secrets Manager + External Secrets Operator
#   - GitOps 환경: SealedSecret CRD 로 _암호화된 형태_ 만 git 에 저장
#   - IAM (IRSA / Workload Identity): 평문 키 없이 클라우드 권한
